esphome:
  name: air-quality-monitor-2
  friendly_name: Air-Quality-Monitor-2
  project:
    name: sheltoncyril.air-quality-monitor
    version: "1.0.0"
  on_boot:
    priority: -100
    then:
      - display.page.show: page_splash
      - component.update: oled_display

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

logger:
  hardware_uart: USB_CDC

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Air-Quality-Monitor-2"
    password: !secret ap_password

captive_portal:

external_components:
  - source:
      type: git
      url: https://github.com/sheltoncyril/esphome
      ref: dev
    components: [bme690]

# I2C bus — BME680, VEML7700, OLED all share this
i2c:
  sda: GPIO5
  scl: GPIO6
  scan: false
  frequency: 400kHz

bme690:
  id: bme690_hub
  bsec_library: !secret bsec_library_path
  address: 0x77
  sample_rate: LP
  update_interval: 3s
  state_save_interval: 6h

# UARTs — logger on USB CDC frees both hardware UARTs
uart:
  - id: uart_senseair
    rx_pin: GPIO8
    tx_pin: GPIO7
    baud_rate: 9600
  - id: uart_pms
    rx_pin: GPIO21
    tx_pin: GPIO20
    baud_rate: 9600

# Buzzer PWM output
output:
  - platform: ledc
    pin: GPIO10
    id: buzzer_output

rtttl:
  output: buzzer_output
  id: buzzer

globals:
  - id: boot_fails
    type: int
    restore_value: true
    initial_value: '0'
  - id: booted
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: boot_phase
    type: int
    restore_value: false
    initial_value: '0'
  - id: hw_error
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: fail_co2
    type: bool
    restore_value: true
    initial_value: 'false'
  - id: fail_pm
    type: bool
    restore_value: true
    initial_value: 'false'
  - id: fail_bme
    type: bool
    restore_value: true
    initial_value: 'false'

# Fonts for OLED — pixel fonts for 8-bit look
font:
  - file: "gfonts://Silkscreen"
    id: font_big
    size: 20
  - file: "gfonts://Silkscreen"
    id: font_mid
    size: 12
  - file: "gfonts://Silkscreen"
    id: font_sm
    size: 8

# 1.5" I2C OLED 128x128
display:
  - platform: ssd1306_i2c
    model: "SH1107 128x128"
    address: 0x3C
    rotation: 180°
    id: oled_display
    update_interval: 3s
    pages:
      - id: page_reboot
        lambda: |-
          int w = 128;
          int fx = 44, fy = 2;
          it.rectangle(fx, fy, 40, 40);
          it.line(fx+8, fy+10, fx+14, fy+16); it.line(fx+8, fy+16, fx+14, fy+10);
          it.line(fx+26, fy+10, fx+32, fy+16); it.line(fx+26, fy+16, fx+32, fy+10);
          it.rectangle(fx+14, fy+26, 12, 8);

          it.printf(w / 2, 46, id(font_mid), TextAlign::TOP_CENTER, "Timeout");
          it.line(0, 62, w, 62);
          it.printf(0, 66, id(font_sm), "SenseAir S88");
          it.printf(w, 66, id(font_sm), TextAlign::TOP_RIGHT, id(fail_co2) ? "FAIL" : "OK");
          it.printf(0, 78, id(font_sm), "PMS5003");
          it.printf(w, 78, id(font_sm), TextAlign::TOP_RIGHT, id(fail_pm) ? "FAIL" : "OK");
          it.printf(0, 90, id(font_sm), "BME690");
          it.printf(w, 90, id(font_sm), TextAlign::TOP_RIGHT, id(fail_bme) ? "FAIL" : "OK");
          it.printf(w / 2, 108, id(font_sm), TextAlign::TOP_CENTER, "Rebooting  %d/3", (int)id(boot_fails));

      - id: page_splash
        lambda: |-
          int w = 128;

          if (id(boot_fails) >= 3 || id(hw_error)) {
            if (!id(hw_error)) {
              id(hw_error) = true;
              id(boot_fails) = 0;
            }
            // Inverted header bar
            it.filled_rectangle(0, 0, w, 16);
            it.printf(w / 2, 2, id(font_mid), COLOR_OFF, TextAlign::TOP_CENTER, "HARDWARE ERROR");

            // Dead face
            int fx = 44, fy = 20;
            it.rectangle(fx, fy, 40, 40);
            it.line(fx+8, fy+10, fx+14, fy+16); it.line(fx+8, fy+16, fx+14, fy+10);
            it.line(fx+26, fy+10, fx+32, fy+16); it.line(fx+26, fy+16, fx+32, fy+10);
            it.rectangle(fx+14, fy+26, 12, 8);

            it.line(0, 64, w, 64);
            it.printf(0, 68, id(font_sm), "SenseAir S88");
            it.printf(w, 68, id(font_sm), TextAlign::TOP_RIGHT, id(fail_co2) ? "FAIL" : "OK");
            it.printf(0, 80, id(font_sm), "PMS5003");
            it.printf(w, 80, id(font_sm), TextAlign::TOP_RIGHT, id(fail_pm) ? "FAIL" : "OK");
            it.printf(0, 92, id(font_sm), "BME690");
            it.printf(w, 92, id(font_sm), TextAlign::TOP_RIGHT, id(fail_bme) ? "FAIL" : "OK");
            it.printf(w / 2, 112, id(font_sm), TextAlign::TOP_CENTER, "Check wiring, reboot");
            return;
          }

          it.printf(w / 2, 4, id(font_mid), TextAlign::TOP_CENTER, "Air Quality");
          it.printf(w / 2, 18, id(font_mid), TextAlign::TOP_CENTER, "Monitor");

          int phase = id(boot_phase);
          bool co2_up = !isnan(id(co2_sensor).state) && id(co2_sensor).state > 0;
          bool pm_up = !isnan(id(pm25).state);
          bool bme_up = !isnan(id(temp_bme).state);
          int sensors_up = co2_up + pm_up + bme_up;

          if (phase < 1) {
            it.printf(w / 2, 36, id(font_sm), TextAlign::TOP_CENTER, "Initializing sensors");
          } else if (sensors_up == 0) {
            it.printf(w / 2, 36, id(font_sm), TextAlign::TOP_CENTER, "Probing sensors");
          } else if (sensors_up < 3) {
            it.printf(w / 2, 36, id(font_sm), TextAlign::TOP_CENTER, "%d/3 sensors ready", sensors_up);
          } else if (phase == 2) {
            it.printf(w / 2, 36, id(font_sm), TextAlign::TOP_CENTER, "Validating readings");
          } else {
            it.printf(w / 2, 36, id(font_sm), TextAlign::TOP_CENTER, "All systems go");
          }

          it.line(0, 48, w, 48);

          bool co2_has = !isnan(id(co2_sensor).state) && id(co2_sensor).state > 0;
          bool pm_has = !isnan(id(pm25).state);
          bool bme_has = !isnan(id(temp_bme).state);

          float co2v = id(co2_sensor).state;
          float tmpv = id(temp_bme).state;
          float humv = id(hum_bme).state;
          float pmv = id(pm25).state;
          float prsv = id(pressure_sensor).state;

          bool co2_sane = co2_has && co2v >= 300 && co2v <= 5000;
          bool pm_sane = pm_has && pmv >= 0 && pmv <= 1000;
          bool bme_sane = bme_has && tmpv >= -40 && tmpv <= 85 && humv >= 0 && humv <= 100 && prsv >= 800 && prsv <= 1200;

          // SenseAir S88
          it.printf(0, 52, id(font_sm), "SenseAir S88");
          if (phase < 1) {
            it.printf(w, 52, id(font_sm), TextAlign::TOP_RIGHT, "Waiting");
          } else if (!co2_has) {
            it.printf(w, 52, id(font_sm), TextAlign::TOP_RIGHT, "Probing");
          } else if (!co2_sane) {
            it.printf(w, 52, id(font_sm), TextAlign::TOP_RIGHT, "Bad: %.0f", co2v);
          } else {
            it.printf(w, 52, id(font_sm), TextAlign::TOP_RIGHT, "%.0f ppm", co2v);
          }

          // PMS5003
          it.printf(0, 66, id(font_sm), "PMS5003");
          if (phase < 1) {
            it.printf(w, 66, id(font_sm), TextAlign::TOP_RIGHT, "Waiting");
          } else if (!pm_has) {
            it.printf(w, 66, id(font_sm), TextAlign::TOP_RIGHT, "Probing");
          } else if (!pm_sane) {
            it.printf(w, 66, id(font_sm), TextAlign::TOP_RIGHT, "Bad: %.0f", pmv);
          } else {
            it.printf(w, 66, id(font_sm), TextAlign::TOP_RIGHT, "PM2.5: %.0f", pmv);
          }

          // BME690
          it.printf(0, 80, id(font_sm), "BME690");
          if (phase < 1) {
            it.printf(w, 80, id(font_sm), TextAlign::TOP_RIGHT, "Waiting");
          } else if (!bme_has) {
            it.printf(w, 80, id(font_sm), TextAlign::TOP_RIGHT, "Probing");
          } else if (!bme_sane) {
            it.printf(w, 80, id(font_sm), TextAlign::TOP_RIGHT, "Bad: %.0f/%.0f", tmpv, prsv);
          } else {
            it.printf(w, 80, id(font_sm), TextAlign::TOP_RIGHT, "%.1fC %.0f%%", tmpv, humv);
          }

          // Loading bar: 6 steps (connected + sane for each sensor)
          int steps = co2_has + pm_has + bme_has + co2_sane + pm_sane + bme_sane;
          int bar_w = 120;
          int fill = steps * bar_w / 6;
          it.rectangle(4, 98, bar_w, 8);
          if (fill > 0) it.filled_rectangle(4, 98, fill, 8);

          it.printf(w, 112, id(font_sm), TextAlign::TOP_RIGHT, "v" ESPHOME_PROJECT_VERSION);

          if (phase >= 2 && prsv > 0) {
            it.printf(0, 112, id(font_sm), "%.0f hPa  %.0f lx", prsv, id(light_sensor).state);
          }

      - id: page_face
        lambda: |-
          int w = 128;
          int fx = 44, fy = 2;
          int score = 0;
          if (id(co2_sensor).state > 1000) score++;
          if (id(co2_sensor).state > 1500) score++;
          if (id(pm25).state > 35) score++;
          if (id(pm25).state > 55) score++;
          if (!isnan(id(iaq).state) && id(iaq).state > 150) score++;
          if (!isnan(id(iaq).state) && id(iaq).state > 250) score++;

          it.rectangle(fx, fy, 40, 40);
          if (score >= 5) {
            // X_X dead
            it.line(fx+8, fy+10, fx+14, fy+16); it.line(fx+8, fy+16, fx+14, fy+10);
            it.line(fx+26, fy+10, fx+32, fy+16); it.line(fx+26, fy+16, fx+32, fy+10);
            it.rectangle(fx+14, fy+26, 12, 8);
          } else if (score >= 4) {
            // >_< distressed
            it.line(fx+8, fy+11, fx+14, fy+14); it.line(fx+8, fy+17, fx+14, fy+14);
            it.line(fx+32, fy+11, fx+26, fy+14); it.line(fx+32, fy+17, fx+26, fy+14);
            it.filled_rectangle(fx+12, fy+28, 16, 2);
            it.filled_rectangle(fx+10, fy+26, 4, 2);
            it.filled_rectangle(fx+26, fy+26, 4, 2);
            it.filled_rectangle(fx+14, fy+30, 4, 2);
            it.filled_rectangle(fx+22, fy+30, 4, 2);
          } else if (score >= 3) {
            // :( worried + sweat drop
            it.filled_rectangle(fx+10, fy+11, 6, 6);
            it.filled_rectangle(fx+24, fy+11, 6, 6);
            it.filled_rectangle(fx+12, fy+30, 16, 2);
            it.filled_rectangle(fx+10, fy+28, 4, 2);
            it.filled_rectangle(fx+26, fy+28, 4, 2);
            it.filled_rectangle(fx+34, fy+8, 2, 4);
            it.filled_rectangle(fx+33, fy+12, 4, 2);
          } else if (score >= 2) {
            // :| neutral
            it.filled_rectangle(fx+10, fy+11, 6, 6);
            it.filled_rectangle(fx+24, fy+11, 6, 6);
            it.filled_rectangle(fx+12, fy+28, 16, 2);
          } else if (score >= 1) {
            // :) happy
            it.filled_rectangle(fx+10, fy+11, 6, 6);
            it.filled_rectangle(fx+24, fy+11, 6, 6);
            it.filled_rectangle(fx+12, fy+26, 16, 2);
            it.filled_rectangle(fx+10, fy+28, 4, 2);
            it.filled_rectangle(fx+26, fy+28, 4, 2);
          } else {
            // ^_^ ecstatic
            it.line(fx+8, fy+16, fx+13, fy+10); it.line(fx+13, fy+10, fx+18, fy+16);
            it.line(fx+22, fy+16, fx+27, fy+10); it.line(fx+27, fy+10, fx+32, fy+16);
            it.filled_rectangle(fx+10, fy+26, 20, 2);
            it.filled_rectangle(fx+8, fy+28, 4, 2);
            it.filled_rectangle(fx+28, fy+28, 4, 2);
          }

          it.line(0, 46, w, 46);

          it.printf(w / 2, 50, id(font_mid), TextAlign::TOP_CENTER, "CO2");
          it.printf(w / 2, 64, id(font_big), TextAlign::TOP_CENTER, "%.0f", id(co2_sensor).state);

          it.line(0, 88, w, 88);

          it.printf(0, 92, id(font_mid), "IAQ");
          if (isnan(id(iaq).state)) {
            it.printf(0, 106, id(font_mid), "--");
          } else {
            it.printf(0, 106, id(font_mid), "%.0f", id(iaq).state);
          }
          it.printf(w, 92, id(font_mid), TextAlign::TOP_RIGHT, "PM2.5");
          it.printf(w, 106, id(font_mid), TextAlign::TOP_RIGHT, "%.0f ug", id(pm25).state);

          it.printf(w / 2 - 10, 92, id(font_mid), TextAlign::TOP_CENTER, "Temp");
          it.printf(w / 2 - 10, 106, id(font_mid), TextAlign::TOP_CENTER, "%.1f C", id(temp_bme).state);

      - id: page_air
        lambda: |-
          int w = 128;
          it.printf(0, 2, id(font_mid), "Air");
          it.line(0, 16, w, 16);

          it.printf(0, 20, id(font_sm), "CO2");
          it.printf(w, 20, id(font_sm), TextAlign::TOP_RIGHT, "%.0f ppm", id(co2_sensor).state);
          it.printf(0, 34, id(font_sm), "eCO2");
          it.printf(w, 34, id(font_sm), TextAlign::TOP_RIGHT, "%.0f ppm", id(co2_eq).state);
          it.printf(0, 48, id(font_sm), "IAQ");
          if (isnan(id(iaq).state)) {
            it.printf(w, 48, id(font_sm), TextAlign::TOP_RIGHT, "--");
          } else {
            it.printf(w, 48, id(font_sm), TextAlign::TOP_RIGHT, "%.0f", id(iaq).state);
          }
          it.printf(0, 62, id(font_sm), "Static IAQ");
          it.printf(w, 62, id(font_sm), TextAlign::TOP_RIGHT, "%.0f", id(static_iaq).state);
          it.printf(0, 76, id(font_sm), "Gas Res");
          it.printf(w, 76, id(font_sm), TextAlign::TOP_RIGHT, "%.0f ohm", id(gas_res).state);
          it.printf(0, 90, id(font_sm), "PM 1.0");
          it.printf(w, 90, id(font_sm), TextAlign::TOP_RIGHT, "%.0f ug/m3", id(pm10_raw).state);
          it.printf(0, 104, id(font_sm), "PM 2.5");
          it.printf(w, 104, id(font_sm), TextAlign::TOP_RIGHT, "%.0f ug/m3", id(pm25).state);
          it.printf(0, 118, id(font_sm), "PM 10");
          it.printf(w, 118, id(font_sm), TextAlign::TOP_RIGHT, "%.0f ug/m3", id(pm100).state);

      - id: page_env
        lambda: |-
          int w = 128;
          it.printf(0, 2, id(font_mid), "Environment");
          it.line(0, 16, w, 16);

          it.printf(0, 20, id(font_sm), "Temp");
          it.printf(w, 20, id(font_sm), TextAlign::TOP_RIGHT, "%.1f C", id(temp_bme).state);
          it.printf(0, 32, id(font_sm), "Humidity");
          it.printf(w, 32, id(font_sm), TextAlign::TOP_RIGHT, "%.1f%%", id(hum_bme).state);
          it.printf(0, 44, id(font_sm), "Pressure");
          it.printf(w, 44, id(font_sm), TextAlign::TOP_RIGHT, "%.0f hPa", id(pressure_sensor).state);
          it.printf(0, 56, id(font_sm), "Dew Point");
          it.printf(w, 56, id(font_sm), TextAlign::TOP_RIGHT, "%.1f C", id(dew_point).state);
          it.printf(0, 68, id(font_sm), "Abs Humidity");
          it.printf(w, 68, id(font_sm), TextAlign::TOP_RIGHT, "%.1f g/m3", id(abs_hum).state);
          it.printf(0, 80, id(font_sm), "Light");
          it.printf(w, 80, id(font_sm), TextAlign::TOP_RIGHT, "%.0f lx", id(light_sensor).state);
          it.printf(0, 92, id(font_sm), "IR");
          it.printf(w, 92, id(font_sm), TextAlign::TOP_RIGHT, "%.0f lx", id(ir_light).state);
          it.printf(0, 104, id(font_sm), "BSEC");
          it.printf(w, 104, id(font_sm), TextAlign::TOP_RIGHT, "%s", id(iaq_accuracy_text).state.c_str());


interval:
  - interval: 8s
    then:
      - lambda: |-
          bool ready = !isnan(id(co2_sensor).state) && id(co2_sensor).state > 0
                    && !isnan(id(pm25).state)
                    && !isnan(id(temp_bme).state);

          if (!id(booted)) {
            if (id(boot_fails) >= 3 || id(hw_error)) {
              id(oled_display).show_page(id(page_splash));
              id(oled_display).update();
              return;
            }

            static int boot_ticks = 0;
            boot_ticks++;

            bool co2_has = !isnan(id(co2_sensor).state) && id(co2_sensor).state > 0;
            bool pm_has = !isnan(id(pm25).state);
            bool bme_has = !isnan(id(temp_bme).state);
            bool all_connected = co2_has && pm_has && bme_has;

            float co2v = id(co2_sensor).state;
            float tmpv = id(temp_bme).state;
            float humv = id(hum_bme).state;
            float pmv = id(pm25).state;
            float prsv = id(pressure_sensor).state;
            bool co2_sane = co2_has && co2v >= 300 && co2v <= 5000;
            bool pm_sane = pm_has && pmv >= 0 && pmv <= 1000;
            bool bme_sane = bme_has && tmpv >= -40 && tmpv <= 85 && humv >= 0 && humv <= 100 && prsv >= 800 && prsv <= 1200;

            static int co2_ok_count = 0, pm_ok_count = 0, bme_ok_count = 0;
            co2_ok_count = co2_sane ? co2_ok_count + 1 : 0;
            pm_ok_count = pm_sane ? pm_ok_count + 1 : 0;
            bme_ok_count = bme_sane ? bme_ok_count + 1 : 0;

            int co2_need = id(fail_co2) ? 5 : 2;
            int pm_need = id(fail_pm) ? 5 : 2;
            int bme_need = id(fail_bme) ? 5 : 2;
            bool all_stable = co2_ok_count >= co2_need && pm_ok_count >= pm_need && bme_ok_count >= bme_need;

            if (id(boot_phase) == 0 && boot_ticks >= 1) id(boot_phase) = 1;
            if (id(boot_phase) == 1 && all_connected) id(boot_phase) = 2;
            if (id(boot_phase) == 2 && all_stable) id(boot_phase) = 3;

            if (id(boot_phase) == 3) {
              id(booted) = true;
              id(boot_fails) = 0;
              id(fail_co2) = false;
              id(fail_pm) = false;
              id(fail_bme) = false;
              id(buzzer).play("boot:d=16,o=7,b=400:g,b");
              id(oled_display).show_page(id(page_face));
              id(oled_display).update();
              return;
            }

            if (boot_ticks > 11) {
              id(boot_fails) += 1;
              id(fail_co2) = !co2_has;
              id(fail_pm) = !pm_has;
              id(fail_bme) = !bme_has;
              id(oled_display).show_page(id(page_reboot));
              id(oled_display).update();
              id(buzzer).play("err:d=8,o=4,b=120:c,p,c,p,c");
              delay(3000);
              App.safe_reboot();
            }

            id(oled_display).show_page(id(page_splash));
            id(oled_display).update();
            return;
          }

          static int tick = 0;
          tick = (tick + 1) % 4;
          if (tick == 2)
            id(oled_display).show_page(id(page_air));
          else if (tick == 3)
            id(oled_display).show_page(id(page_env));
          else
            id(oled_display).show_page(id(page_face));
      - component.update: oled_display
  - interval: 60s
    then:
      - lambda: |-
          if (!id(buzzer_alert).state) return;
          static uint32_t boot_time = millis();
          if (millis() - boot_time < 90000) return;
          if (isnan(id(co2_sensor).state) || isnan(id(pm25).state)) return;

          static bool co2_1k = false, co2_1k5 = false;
          static bool pm_35 = false, pm_55 = false;
          static bool iaq_150 = false, iaq_250 = false;

          float co2 = id(co2_sensor).state;
          if (co2 > 1000) co2_1k = true; else if (co2 < 900) co2_1k = false;
          if (co2 > 1500) co2_1k5 = true; else if (co2 < 1350) co2_1k5 = false;

          float pm = id(pm25).state;
          if (pm > 35) pm_35 = true; else if (pm < 30) pm_35 = false;
          if (pm > 55) pm_55 = true; else if (pm < 48) pm_55 = false;

          float iq = id(iaq).state;
          bool iq_valid = !isnan(iq);
          if (iq_valid && iq > 150) iaq_150 = true; else if (!iq_valid || iq < 130) iaq_150 = false;
          if (iq_valid && iq > 250) iaq_250 = true; else if (!iq_valid || iq < 220) iaq_250 = false;

          int score = co2_1k + co2_1k5 + pm_35 + pm_55 + iaq_150 + iaq_250;
          static int last_score = -1;
          if (score == last_score) return;
          last_score = score;
          if (score == 0) {
            id(buzzer).play("good:d=16,o=6,b=180:c,e,g");
          } else if (score == 1) {
            id(buzzer).play("ok:d=16,o=6,b=180:e,g");
          } else if (score == 2) {
            id(buzzer).play("fair:d=16,o=5,b=160:a,a");
          } else if (score == 3) {
            id(buzzer).play("poor:d=16,o=5,b=160:e,d,c");
          } else if (score == 4) {
            id(buzzer).play("bad:d=16,o=5,b=140:e,d#,c");
          } else {
            id(buzzer).play("vbad:d=8,o=4,b=120:c,p,c");
          }


sensor:
  # SenseAir S88 — CO2
  - platform: senseair
    id: senseair_id
    uart_id: uart_senseair
    co2:
      id: co2_sensor
      name: "CO2"
    update_interval: 15s

  # PMS5003 — Particulate Matter
  - platform: pmsx003
    type: PMSX003
    uart_id: uart_pms
    pm_1_0:
      name: "PM 1.0"
      id: pm10_raw
    pm_2_5:
      name: "PM 2.5"
      id: pm25
    pm_10_0:
      name: "PM 10"
      id: pm100
    update_interval: 30s

  # BME690 — Temp, Humidity, Pressure, Gas, IAQ (via BSEC3)
  - platform: bme690
    bme690_id: bme690_hub
    temperature:
      name: "Temperature"
      id: temp_bme
    humidity:
      name: "Humidity"
      id: hum_bme
    pressure:
      name: "Pressure"
      id: pressure_sensor
    gas_resistance:
      name: "Gas Resistance"
      id: gas_res
    iaq:
      name: "IAQ"
      id: iaq
    static_iaq:
      name: "Static IAQ"
      id: static_iaq
    co2_equivalent:
      name: "CO2 Equivalent"
      id: co2_eq
    gas_percentage:
      name: "Gas Percentage"
      id: gas_pct

  # VEML7700 — Ambient Light
  - platform: veml7700
    address: 0x10
    auto_mode: true
    integration_time: 800ms
    gain: 2X
    ambient_light:
      name: "Ambient Light"
      id: light_sensor
    full_spectrum:
      name: "Full Spectrum Light"
    infrared:
      name: "Infrared Light"
      id: ir_light
    ambient_light_counts:
      name: "Ambient Light Counts"
    full_spectrum_counts:
      name: "Full Spectrum Counts"
    update_interval: 30s

  # Absolute Humidity (calculated)
  - platform: absolute_humidity
    name: "Absolute Humidity"
    id: abs_hum
    temperature: temp_bme
    humidity: hum_bme

  # Dew Point (calculated)
  - platform: template
    name: "Dew Point"
    id: dew_point
    lambda: |-
      return (243.5*(log(id(hum_bme).state/100)+((17.67*id(temp_bme).state)/
      (243.5+id(temp_bme).state)))/(17.67-log(id(hum_bme).state/100)-
      ((17.67*id(temp_bme).state)/(243.5+id(temp_bme).state))));
    unit_of_measurement: °C
    icon: mdi:thermometer-alert
    update_interval: 60s

text_sensor:
  # CO2 Status
  - platform: template
    name: "CO2 Status"
    id: co2_status
    icon: mdi:molecule-co2
    lambda: |-
      if (id(co2_sensor).state < 800) {
        return {"Good"};
      } else if (id(co2_sensor).state < 1000) {
        return {"Fair"};
      } else if (id(co2_sensor).state < 1500) {
        return {"Poor"};
      } else {
        return {"Bad"};
      }
    update_interval: 15s

  # PM2.5 Status
  - platform: template
    name: "PM2.5 Status"
    id: pm25_status
    icon: mdi:air-filter
    lambda: |-
      if (id(pm25).state < 12) {
        return {"Good"};
      } else if (id(pm25).state < 35) {
        return {"Fair"};
      } else if (id(pm25).state < 55) {
        return {"Poor"};
      } else {
        return {"Bad"};
      }
    update_interval: 30s

  # Overall Air Quality (CO2 + PM2.5 + IAQ based)
  - platform: template
    name: "Air Quality"
    id: air_quality
    icon: mdi:air-purifier
    lambda: |-
      int score = 0;
      if (id(co2_sensor).state > 1000) score++;
      if (id(co2_sensor).state > 1500) score++;
      if (id(pm25).state > 35) score++;
      if (!isnan(id(iaq).state) && id(iaq).state > 150) score++;
      if (!isnan(id(iaq).state) && id(iaq).state > 250) score++;
      if (score == 0) return {"Excellent"};
      else if (score == 1) return {"Good"};
      else if (score == 2) return {"Fair"};
      else if (score == 3) return {"Poor"};
      else return {"Bad"};
    update_interval: 15s

  # BME690 IAQ Classification
  - platform: template
    name: "BME690 IAQ Classification"
    lambda: |-
      if (isnan(id(iaq).state)) {
        return {"Calibrating"};
      }
      int val = (int)id(iaq).state;
      if (val <= 50) {
        return {"Excellent"};
      } else if (val <= 100) {
        return {"Good"};
      } else if (val <= 150) {
        return {"Lightly polluted"};
      } else if (val <= 200) {
        return {"Moderately polluted"};
      } else if (val <= 250) {
        return {"Heavily polluted"};
      } else if (val <= 350) {
        return {"Severely polluted"};
      } else if (val <= 500) {
        return {"Extremely polluted"};
      } else {
        return {"Error"};
      }

  # BME690 IAQ Accuracy (from bme690 component)
  - platform: bme690
    bme690_id: bme690_hub
    iaq_accuracy:
      name: "IAQ Accuracy"
      id: iaq_accuracy_text

binary_sensor:
  # Ventilation needed (CO2 or IAQ based)
  - platform: template
    name: "Ventilation Needed"
    icon: mdi:window-open-variant
    lambda: |-
      return (id(co2_sensor).state > 1200 || id(pm25).state > 35 || (!isnan(id(iaq).state) && id(iaq).state > 200));

button:
  - platform: template
    name: "Buzzer Test"
    entity_category: config
    on_press:
      - rtttl.play: "test:d=16,o=6,b=180:e,g,e"
  - platform: template
    name: "SenseAir Background Calibrate"
    entity_category: config
    on_press:
      - senseair.background_calibration: senseair_id
  - platform: template
    name: "SenseAir ABC Enable"
    entity_category: config
    on_press:
      - senseair.abc_enable: senseair_id
  - platform: template
    name: "SenseAir ABC Disable"
    entity_category: config
    on_press:
      - senseair.abc_disable: senseair_id
  - platform: template
    name: "SenseAir Factory Calibration"
    entity_category: config
    on_press:
      - if:
          condition:
            lambda: 'return millis() > 60000;'
          then:
            - uart.write:
                id: uart_senseair
                data: [0xFE, 0x06, 0x00, 0x01, 0x7C, 0x02, 0x6D, 0x04]

switch:
  - platform: template
    name: "Buzzer Alert"
    id: buzzer_alert
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    turn_on_action:
      - if:
          condition:
            lambda: 'return millis() > 30000;'
          then:
            - rtttl.play: "on:d=16,o=6,b=180:c,g"
    turn_off_action:
      - if:
          condition:
            lambda: 'return millis() > 30000;'
          then:
            - rtttl.play: "off:d=16,o=6,b=180:g,c"
